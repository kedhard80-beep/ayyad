<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Ayyad — Financement médical solidaire en Côte d'Ivoire</title>
    <meta name="description" content="Ayyad connecte les patients dans le besoin avec des donateurs solidaires. Les fonds sont versés directement à l'hôpital partenaire. 100% transparent." />
    <meta name="keywords" content="financement médical, Côte d'Ivoire, don, santé, solidarité, Wave, Orange Money" />
    <meta name="author" content="Ayyad CI" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ayyadci.com" />
    <meta property="og:title" content="Ayyad — Financement médical solidaire" />
    <meta property="og:description" content="Parce que soutenir une vie, c'est en sauver une. Donnez directement à l'hôpital, sans frais cachés." />
    <meta property="og:image" content="https://ayyadci.com/og-image.svg" />
    <meta property="og:locale" content="fr_CI" />
    <meta property="og:site_name" content="Ayyad" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ayyad — Financement médical solidaire" />
    <meta name="twitter:description" content="Parce que soutenir une vie, c'est en sauver une. Donnez directement à l'hôpital, sans frais cachés." />
    <meta name="twitter:image" content="https://ayyadci.com/og-image.svg" />
    <meta name="theme-color" content="#0a3d2e" />

    <!-- ── Premium typography ────────────────────────────────────────────── -->
    <!-- Inter pour le corps (fintech moderne) + Playfair Display pour les titres émotionnels (institutionnel premium) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;0,900;1,500;1,700&display=swap" rel="stylesheet" />

    <style>
      /* ═══════════════════════════════════════════════════════════════════
         AYYAD — DESIGN SYSTEM PREMIUM v2
         Identité : confiance financière + émotion humaine + modernité tech
         ═══════════════════════════════════════════════════════════════════ */
      :root {
        /* Couleurs marque (logo) — émeraude profond + or chaleur */
        --ayyad-deep:      #0a3d2e;  /* émeraude très profond (confiance institutionnelle) */
        --ayyad-emerald:   #0d5c2e;  /* émeraude marque historique */
        --ayyad-green:     #10b981;  /* vert vif (action, succès) */
        --ayyad-mint:      #34d399;  /* mint clair (highlights) */
        --ayyad-teal:      #0f766e;  /* teal moderne */
        --ayyad-gold:      #C9A84C;  /* or marque historique */
        --ayyad-gold-soft: #e9d59a;
        --ayyad-gold-deep: #a17f29;
        --ayyad-coral:     #f43f5e;  /* coral urgence/humanité */
        --ayyad-amber:     #f59e0b;  /* ambre chaleur */
        --ayyad-blue:      #0369a1;  /* bleu confiance (paiement sécurisé) */

        /* Encre & papier */
        --ink-950: #02110b;
        --ink-900: #0a1f1a;
        --ink-800: #1c2b25;
        --ink-700: #2f3e38;
        --ink-500: #5a6a64;
        --ink-400: #7a8a84;
        --ink-300: #b6bfba;
        --ink-200: #d8ddd9;
        --ink-100: #ebefec;
        --paper:      #fdfcfa;
        --paper-soft: #f7f6f2;
        --paper-warm: #fbf9f3;

        /* Ombres premium (multi-couches) */
        --shadow-xs: 0 1px 2px rgba(10, 31, 26, 0.05);
        --shadow-sm: 0 2px 4px rgba(10, 31, 26, 0.06), 0 1px 2px rgba(10, 31, 26, 0.04);
        --shadow-md: 0 6px 12px rgba(10, 31, 26, 0.06), 0 2px 4px rgba(10, 31, 26, 0.04);
        --shadow-lg: 0 14px 32px rgba(10, 31, 26, 0.10), 0 4px 8px rgba(10, 31, 26, 0.04);
        --shadow-xl: 0 24px 60px rgba(10, 31, 26, 0.14), 0 8px 16px rgba(10, 31, 26, 0.06);
        --shadow-2xl: 0 40px 100px rgba(10, 31, 26, 0.20), 0 12px 24px rgba(10, 31, 26, 0.08);
        --shadow-glow-gold: 0 8px 32px rgba(201, 168, 76, 0.32);
        --shadow-glow-emerald: 0 12px 40px rgba(13, 92, 46, 0.28);

        /* Gradients signature */
        --grad-emerald: linear-gradient(135deg, #0a3d2e 0%, #0d5c2e 45%, #0f766e 100%);
        --grad-emerald-soft: linear-gradient(135deg, #0d5c2e 0%, #10b981 100%);
        --grad-gold: linear-gradient(135deg, #C9A84C 0%, #e9d59a 50%, #C9A84C 100%);
        --grad-paper: linear-gradient(180deg, #fdfcfa 0%, #f7f6f2 100%);
        --grad-hero-overlay: linear-gradient(135deg, rgba(10,31,26,0.78) 0%, rgba(13,92,46,0.68) 55%, rgba(15,118,110,0.62) 100%);
        --grad-hero-bottom: linear-gradient(180deg, rgba(10,31,26,0) 0%, rgba(10,31,26,0.55) 60%, rgba(10,31,26,0.92) 100%);

        /* Rayons & rythme */
        --r-xs: 6px;
        --r-sm: 10px;
        --r-md: 14px;
        --r-lg: 20px;
        --r-xl: 28px;
        --r-2xl: 36px;
        --r-pill: 9999px;

        /* Transitions */
        --t-fast: 180ms cubic-bezier(0.4, 0, 0.2, 1);
        --t-base: 280ms cubic-bezier(0.4, 0, 0.2, 1);
        --t-slow: 600ms cubic-bezier(0.16, 1, 0.3, 1);
        --t-spring: 480ms cubic-bezier(0.34, 1.56, 0.64, 1);

        /* Typo */
        --font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        --font-serif: 'Playfair Display', 'Georgia', 'Times New Roman', serif;
      }

      /* ── Base ─────────────────────────────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; }
      html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility; overflow-x: hidden; }
      body { font-family: var(--font-sans); color: var(--ink-900); background: var(--paper); margin: 0; overflow-x: hidden; max-width: 100vw; }
      /* Prévention overflow horizontal — chaque image et media reste dans son container */
      img, video, iframe { max-width: 100%; height: auto; }

      /* Sélection texte premium */
      ::selection { background: rgba(201, 168, 76, 0.30); color: var(--ayyad-deep); }

      /* Scrollbar discrète */
      @media (pointer: fine) {
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--paper-soft); }
        ::-webkit-scrollbar-thumb { background: var(--ink-200); border-radius: 9999px; border: 2px solid var(--paper-soft); }
        ::-webkit-scrollbar-thumb:hover { background: var(--ayyad-emerald); }
      }

      /* ═══════════════════════════════════════════════════════════════════
         ANIMATIONS PREMIUM
         ═══════════════════════════════════════════════════════════════════ */

      /* Reveal au scroll (IntersectionObserver côté JS) */
      .ayyad-reveal { opacity: 0; transform: translateY(28px); transition: opacity 800ms cubic-bezier(0.16,1,0.3,1), transform 800ms cubic-bezier(0.16,1,0.3,1); will-change: opacity, transform; }
      .ayyad-reveal.is-visible { opacity: 1; transform: translateY(0); }

      .ayyad-reveal-left { opacity: 0; transform: translateX(-40px); transition: opacity 900ms cubic-bezier(0.16,1,0.3,1), transform 900ms cubic-bezier(0.16,1,0.3,1); }
      .ayyad-reveal-left.is-visible { opacity: 1; transform: translateX(0); }

      .ayyad-reveal-right { opacity: 0; transform: translateX(40px); transition: opacity 900ms cubic-bezier(0.16,1,0.3,1), transform 900ms cubic-bezier(0.16,1,0.3,1); }
      .ayyad-reveal-right.is-visible { opacity: 1; transform: translateX(0); }

      .ayyad-reveal-scale { opacity: 0; transform: scale(0.94); transition: opacity 800ms cubic-bezier(0.16,1,0.3,1), transform 800ms cubic-bezier(0.16,1,0.3,1); }
      .ayyad-reveal-scale.is-visible { opacity: 1; transform: scale(1); }

      /* Keyframes signature */
      @keyframes ayyad-float       { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      @keyframes ayyad-pulse-soft  { 0%,100% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.08); } }
      @keyframes ayyad-shimmer     { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
      @keyframes ayyad-ken-burns   { 0% { transform: scale(1) translate(0,0); } 100% { transform: scale(1.12) translate(-2%, -1%); } }
      @keyframes ayyad-slide-up    { from { opacity:0; transform: translateY(24px); } to { opacity:1; transform: translateY(0); } }
      @keyframes ayyad-fade-in     { from { opacity:0; } to { opacity:1; } }
      @keyframes ayyad-bounce-soft { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
      @keyframes ayyad-scroll-hint { 0%,100% { transform: translateY(0); opacity: 0.7; } 50% { transform: translateY(8px); opacity: 1; } }
      @keyframes ayyad-rotate-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

      /* Hero ken-burns sur l'image active */
      .ayyad-hero-slide.is-active .ayyad-hero-bg { animation: ayyad-ken-burns 12s ease-out forwards; }

      /* Hover lift */
      .ayyad-lift { transition: transform var(--t-base), box-shadow var(--t-base); }
      .ayyad-lift:hover { transform: translateY(-6px); box-shadow: var(--shadow-xl); }

      /* Underline anim (navbar) */
      .ayyad-link { position: relative; }
      .ayyad-link::after {
        content: ""; position: absolute; left: 12px; right: 12px; bottom: 4px; height: 2px;
        background: linear-gradient(90deg, var(--ayyad-gold), var(--ayyad-emerald));
        transform: scaleX(0); transform-origin: left;
        transition: transform var(--t-base);
        border-radius: 999px;
      }
      .ayyad-link:hover::after, .ayyad-link.is-active::after { transform: scaleX(1); }

      /* Bouton premium signature */
      .ayyad-btn-primary {
        position: relative;
        background: var(--grad-emerald);
        color: #fff;
        font-weight: 700;
        padding: 14px 28px;
        border-radius: var(--r-pill);
        box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255,255,255,0.18);
        transition: transform var(--t-base), box-shadow var(--t-base), filter var(--t-base);
        overflow: hidden;
      }
      .ayyad-btn-primary::before {
        content: ""; position: absolute; inset: 0;
        background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.25) 50%, transparent 70%);
        transform: translateX(-100%);
        transition: transform 700ms ease;
      }
      .ayyad-btn-primary:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,0.22); filter: brightness(1.06); }
      .ayyad-btn-primary:hover::before { transform: translateX(100%); }

      .ayyad-btn-gold {
        background: var(--grad-gold);
        color: var(--ayyad-deep);
        font-weight: 800;
        padding: 14px 28px;
        border-radius: var(--r-pill);
        box-shadow: var(--shadow-glow-gold), inset 0 1px 0 rgba(255,255,255,0.4);
        transition: transform var(--t-base), box-shadow var(--t-base), filter var(--t-base);
      }
      .ayyad-btn-gold:hover { transform: translateY(-2px); filter: brightness(1.08); box-shadow: 0 14px 40px rgba(201, 168, 76, 0.45); }

      .ayyad-btn-ghost {
        background: rgba(255,255,255,0.10);
        border: 1.5px solid rgba(255,255,255,0.28);
        backdrop-filter: blur(8px);
        color: #fff;
        font-weight: 600;
        padding: 13px 26px;
        border-radius: var(--r-pill);
        transition: all var(--t-base);
      }
      .ayyad-btn-ghost:hover { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.5); transform: translateY(-2px); }

      /* Titre éditorial Playfair */
      .ayyad-h-display {
        font-family: var(--font-serif);
        font-weight: 800;
        letter-spacing: -0.02em;
        line-height: 1.08;
        color: var(--ayyad-deep);
      }
      .ayyad-h-display em { font-style: italic; color: var(--ayyad-gold-deep); font-weight: 600; }

      /* Eyebrow (suréclat) */
      .ayyad-eyebrow {
        display: inline-flex; align-items: center; gap: 8px;
        font-size: 11px; font-weight: 800; letter-spacing: 2.4px; text-transform: uppercase;
        color: var(--ayyad-gold-deep);
        padding: 6px 16px;
        background: rgba(201, 168, 76, 0.10);
        border: 1px solid rgba(201, 168, 76, 0.30);
        border-radius: 999px;
      }
      .ayyad-eyebrow::before { content: ""; width: 6px; height: 6px; border-radius: 999px; background: var(--ayyad-gold); box-shadow: 0 0 0 4px rgba(201,168,76,0.18); }

      /* Carte de fond — gradient subtil + bord premium */
      .ayyad-card {
        background: #fff;
        border: 1px solid rgba(10, 31, 26, 0.06);
        border-radius: var(--r-lg);
        box-shadow: var(--shadow-sm);
        transition: transform var(--t-base), box-shadow var(--t-base), border-color var(--t-base);
      }
      .ayyad-card:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow-xl);
        border-color: rgba(13, 92, 46, 0.18);
      }

      /* Shimmer gradient — pour effets de chargement / highlight texte */
      .ayyad-shimmer-text {
        background: linear-gradient(90deg, var(--ayyad-deep) 0%, var(--ayyad-gold-deep) 25%, var(--ayyad-deep) 50%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: ayyad-shimmer 4s linear infinite;
      }

      /* Hero — overlay et fade entre slides */
      .ayyad-hero-slide { position: absolute; inset: 0; opacity: 0; transition: opacity 1400ms ease-in-out; }
      .ayyad-hero-slide.is-active { opacity: 1; z-index: 2; }
      .ayyad-hero-bg { position: absolute; inset: 0; background-size: cover; background-position: center; will-change: transform; }

      /* Scroll-hint (chevron animé en bas du hero) */
      .ayyad-scroll-hint { animation: ayyad-scroll-hint 2.2s ease-in-out infinite; }

      /* Compteur stats — accent gold */
      .ayyad-counter {
        font-family: var(--font-serif);
        font-weight: 800;
        font-size: clamp(2.2rem, 4.8vw, 3.6rem);
        line-height: 1;
        background: linear-gradient(135deg, var(--ayyad-deep) 0%, var(--ayyad-emerald) 60%, var(--ayyad-gold-deep) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* Badge confiance */
      .ayyad-trust-pill {
        display: inline-flex; align-items: center; gap: 8px;
        background: rgba(255,255,255,0.92);
        border: 1px solid rgba(13, 92, 46, 0.18);
        color: var(--ayyad-deep);
        font-weight: 600; font-size: 12px;
        padding: 7px 14px;
        border-radius: 999px;
        box-shadow: var(--shadow-xs);
        backdrop-filter: blur(8px);
      }

      /* Marquee pour le ticker hôpitaux / témoignages */
      @keyframes ayyad-marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
      .ayyad-marquee-track { display: flex; gap: 48px; animation: ayyad-marquee 30s linear infinite; width: max-content; }
      .ayyad-marquee:hover .ayyad-marquee-track { animation-play-state: paused; }

      /* Conteneur cohérent */
      .ayyad-container { max-width: 1240px; margin: 0 auto; padding: 0 24px; }

      /* Section rythme */
      .ayyad-section { padding: clamp(72px, 9vw, 128px) 0; position: relative; }
      .ayyad-section--tight { padding: clamp(56px, 7vw, 96px) 0; }

      /* Divider doré subtil */
      .ayyad-divider-gold {
        display: block; width: 60px; height: 3px;
        background: var(--grad-gold);
        border-radius: 999px;
        margin: 0 auto 24px;
      }

      /* Respect des préférences utilisateur (réduction des animations) */
      @media (prefers-reduced-motion: reduce) {
        .ayyad-reveal, .ayyad-reveal-left, .ayyad-reveal-right, .ayyad-reveal-scale {
          opacity: 1 !important; transform: none !important; transition: none !important;
        }
        .ayyad-hero-slide.is-active .ayyad-hero-bg,
        .ayyad-scroll-hint,
        .ayyad-shimmer-text,
        .ayyad-marquee-track { animation: none !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
